name: test node project
on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]
        types: [ opened ]
jobs:
    test: 
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./02-simple-nod-app
        steps:
            - uses: actions/checkout@v3
            - name: Use Node.js 22.x
              uses: actions/setup-node@v3
              with:
                node-version: 22.x
            - name: cache node modules
              uses: actions/cache@v5
              with:
                path: ~/.npm
                key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
                restore-keys: |
                  ${{ runner.os }}-node-
            - run: npm ci
            - run: npm run lint
            - run: npm test
    build: 
        runs-on: ubuntu-latest
        needs: test
        defaults:
            run:
                working-directory: ./02-simple-nod-app
        outputs:
            js_file_name: ${{ steps.publish-js-file-name.outputs.js_file_name }}
        steps:
            - uses: actions/checkout@v3
            - name: Use Node.js 22.x
              uses: actions/setup-node@v3
              with:
                node-version: 22.x
            - name: cache node modules
              uses: actions/cache@v5
              with:
                path: ~/.npm
                key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
                restore-keys: |
                  ${{ runner.os }}-node-
            - name: Install dependencies and build
              run: npm ci
            - name: Build project
              run: npm run build
            - name: List build output
              run: ls -la
            - name: publish js file name
              id: publish-js-file-name
              run: echo "js_file_name=$(find dist -name '*.js' | head -n 1)" >> $GITHUB_OUTPUT
            - name: Upload build artifacts
              uses: actions/upload-artifact@v7
              with:
                name: simple-node-app-artifacts
                path: |
                    02-simple-nod-app/dist
                    02-simple-nod-app/package.json
    deploy: 
        runs-on: ubuntu-latest
        needs: build
        steps:
            - name: Download build artifacts
              uses: actions/download-artifact@v7
              with:
                name: simple-node-app-artifacts
            - name: list artifacts
              run: ls -la
            - name: deploy to server
              run: echo "Deploying to server..."
            - name: check output js file name
              run:  echo "JS file name - ${{ needs.build.outputs.js_file_name }}"
            - name: check environment variable
              run: echo "Environment variable - ${{ env.ENV_VAR }}"
              env:
                ENV_VAR: "This is an environment variable"