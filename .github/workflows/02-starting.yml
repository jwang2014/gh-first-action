name: test node project
on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]
jobs:
    test: 
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: ./02-simple-nod-app
        steps:
            - uses: actions/checkout@v3
            - name: Use Node.js 22.x
              uses: actions/setup-node@v3
              with:
                node-version: 22.x
            - run: npm install
            - run: npm test
